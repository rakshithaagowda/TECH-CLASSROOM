<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tech Classroom | To-Do List</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/todo.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- 🌐 Navbar (Auto-updated by session.js) -->
  <nav class="navbar">
    <div class="logo">Tech Classroom</div>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="Classroom.html">Classroom</a></li>
      <li><a href="quiz.html">Quiz</a></li>
      <li><a href="chatbot.html">Chatbot</a></li>
      <li><a href="todo.html" class="active">To-Do</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="resources.html">Resources</a></li>

      <!-- This will be replaced by session.js automatically -->
      <li id="authLink"><a href="login.html">Login</a></li>

      <!-- Hidden logout button (session.js will show it when logged in) -->
      <li><button id="logoutBtn" class="btn secondary" style="display:none;">Logout</button></li>
    </ul>
  </nav>

  <!-- 📝 To-Do Section -->
  <section class="todo-section">
    <div class="todo-header">
      <h1>My To-Do List</h1>
      <div class="todo-input-group">
        <input type="text" id="taskInput" placeholder="Add a new task..." />
        <button id="addTaskBtn" class="btn primary">Add Task</button>
      </div>
    </div>

    <div id="taskContainer" class="todo-grid">
      <!-- Tasks injected by JS -->
    </div>

    <div class="todo-summary">
      <p>Total Tasks: <span id="totalTasks">0</span></p>
      <p>Completed Tasks: <span id="completedTasks">0</span></p>
    </div>
  </section>

  <!-- 📞 Footer -->
  <footer>
    <p>Contact: <a href="mailto:support@techclassroom.com">support@techclassroom.com</a></p>
    <p>&copy; 2025 Tech Classroom. All rights reserved.</p>
  </footer>

 <!-- Session UI Handling -->
<script src="../js/config.js"></script>
<script src="../js/session.js"></script>
<script src="../js/auth_required.js"></script>
<script src="../js/logout.js"></script>
<script src="../js/todo.js"></script>


</body>
</html>
